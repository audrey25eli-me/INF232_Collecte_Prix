<!DOCTYPE html>
<html>
<head>
    <title>Collecte de données - INF 232</title>
    <style>
        body { font-family: sans-serif; margin: 50px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Collecte des prix du marché</h1>
        <p>Aidez-nous à collecter des données pour l'analyse descriptive.</p>
        
        <form method="post">
            {% csrf_token %} {{ form.as_p }}
            <button type="submit">Envoyer les données</button>
        </form>
    </div>
</body>
</html>
